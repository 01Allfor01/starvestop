spring:
  application:
    name: starvestop
  config:
    import: optional:file:backend/.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: ${DDL_AUTO}
    properties:
      hibernate:
        format_sql: false
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      repositories:
        enabled: false
    web:
      pageable:
        max-page-size: 100

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI}/login/oauth/kakao/callback
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
              - profile_image
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com
            user-info-uri: https://kapi.kakao.com
            user-name-attribute: id
app:
  crypto:
    billing-key-base64: ${BILLING_KEY_BASE64}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    bucket-name: ${AWS_BUCKET_NAME}
payment:
  base-url: https://api.tosspayments.com
  secret-key: ${PAYMENT_WIDGET_SECRET_KEY}
  billing-secret-key: ${PAYMENT_SECRET_KEY}

fcm:
  secret-file: ${FCM_SECRET_FILE}

signup:
  admin: ${ADMIN_KEY}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true #응답 시간 표시
    operations-sorter: method #Controller API 정렬 방식 (GET, POST, PUT, DELETE)
    tags-sorter: alpha #Controller 정렬 방식(알파벳 순)

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  file:
    name: /var/log/app/spring.log