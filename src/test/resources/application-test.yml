spring:
  application:
    name: starvestop
  config:
    import: optional:file:.env[.properties]
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TEST_DB_URL}
    username: ${TEST_DB_USERNAME}
    password: ${TEST_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${TEST_DDL_AUTO}
    properties:
      hibernate:
        format_sql: false
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379
