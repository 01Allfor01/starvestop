<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
<div id="payment-method"></div>
<div id="agreement"></div>
<button id="payment-button" style="margin-top: 30px">결제하기</button>

<script>
    main();

    async function main() {
        const token = localStorage.getItem("token");
        if (!token) {
            alert("로그인이 필요합니다.");
            return;
        }

        // 1) 결제 준비(서버에서 orderKey/amount/orderName 내려줌)
        const createRes = await fetch("/payments", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": token
            },
            body: JSON.stringify({
                orderId: 2 // <- 주문 PK를 서버에 전달(서버가 orderKey를 만들어서 내려줌)
            })
        });

        const createJson = await createRes.json();
        if (!createRes.ok) {
            alert(createJson.message || "결제 준비 실패");
            return;
        }

        const data = createJson.data;
        const orderKey = data.orderKey;
        const amount = Number(data.amount);
        const customerKey = String(data.customerKey || "guest");

        // 2) 토스 위젯 초기화
        const clientKey = "test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm";
        const tossPayments = TossPayments(clientKey);
        const widgets = tossPayments.widgets({customerKey});

        await widgets.setAmount({currency: "KRW", value: amount});

        await Promise.all([
            widgets.renderPaymentMethods({selector: "#payment-method", variantKey: "DEFAULT"}),
            widgets.renderAgreement({selector: "#agreement", variantKey: "AGREEMENT"}),
        ]);

        // 3) 결제 요청 → 성공/실패 시 서버 엔드포인트로 리다이렉트됨
        document.getElementById("payment-button").addEventListener("click", async (e) => {
            e.preventDefault();
            try {
                await widgets.requestPayment({
                    orderId: orderKey,
                    orderName: orderKey,
                    successUrl: window.location.origin + "/payments/success",
                    failUrl: window.location.origin + "/payments/fail",
                });
            } catch (err) {
                alert(`SDK 단계 실패: ${err?.code ?? "NO_CODE"} / ${err?.message ?? "NO_MESSAGE"}`);
                console.error(err);
            }
        });
    }
</script>
</body>
</html>
