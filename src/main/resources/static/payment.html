<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
<div id="payment-method"></div>
<div id="agreement"></div>
<button id="payment-button" style="margin-top: 30px">결제하기</button>

<script>
    main();

    async function main() {
        const createRes = await fetch("/payments", {
            method: "POST",
            headers: { "Content-Type": "application/json",
                "Authorization": "Bearer eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIyIiwidXNlcm5hbWUiOiLspazrlJQiLCJ1c2VyRW1haWwiOiJ6b29kaWUxMkB1c2VyLmNvbSIsInVzZXJSb2xlIjoiVVNFUiIsImlhdCI6MTc2ODgzMzQ1NiwiZXhwIjoxNzY4ODM3MDU2fQ.OaE-OFo3oLvR_koPdM2wz6x2O3VAzTNS-X64zJwf9w4"},
            body: JSON.stringify({
                purchaseId: 1,
                purchaseType: "PRODUCT",
            })
        });

        const createJson = await createRes.json();
        if (!createRes.ok) {
            alert(createJson.message || "결제 준비 실패");
            return;
        }


        const data = createJson.data;
        const orderId = data.orderId;
        const amount = Number(data.amount);
        const orderName = data.purchaseName || "주문";

        const clientKey = "test_gck_docs_Ovk5rk1EwkEbP0W43n07xlzm";
        const tossPayments = TossPayments(clientKey);

        const widgets = tossPayments.widgets({ customerKey: String(data.orderId ?? "guest") });

        await widgets.setAmount({ currency: "KRW", value: amount });

        await Promise.all([
            widgets.renderPaymentMethods({ selector: "#payment-method", variantKey: "DEFAULT" }),
            widgets.renderAgreement({ selector: "#agreement", variantKey: "AGREEMENT" }),
        ]);

        // 4) 결제 요청
        // document.getElementById("payment-button").addEventListener("click", async () => {
        //     await widgets.requestPayment({
        //         orderId,
        //         orderName,
        //         successUrl: window.location.origin + "/payments/success",
        //         failUrl: window.location.origin + "/fail.html",
        //         customerEmail: "customer123@gmail.com",
        //         customerName: "김토스",
        //         customerMobilePhone: "01012341234",
        //     });
        // });
        document.getElementById("payment-button").addEventListener("click", async (e) => {
            e.preventDefault(); // 버튼 기본 동작 차단(예방용)
            try {
                await widgets.requestPayment({
                    orderId,
                    orderName,
                    successUrl: window.location.origin + "/payments/success",
                    failUrl: window.location.origin + "/payments/fail" +
                        "",
                });
            } catch (err) {
                alert(`SDK 단계 실패: ${err?.code ?? "NO_CODE"} / ${err?.message ?? "NO_MESSAGE"}`);
                console.error(err);
            }
        });
    }
</script>
</body>
</html>
