<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <!-- SDK 추가 -->
    <script src="https://js.tosspayments.com/v2/standard"></script>
</head>
<body>
<!-- 카드 등록하기 버튼 -->
<button class="button" style="margin-top: 30px" onclick="requestBillingAuth()">카드 등록하기</button>
<script>
    // ------  SDK 초기화 ------
    // @docs https://docs.tosspayments.com/sdk/v2/js#토스페이먼츠-초기화
    const clientKey = "test_ck_GePWvyJnrK4vp2Zzwgqe8gLzN97E";
    const customerKey = "e05cb76e-e950-484a-a93d-a22198070792";
    const tossPayments = TossPayments(clientKey);
    // 회원 결제
    // @docs https://docs.tosspayments.com/sdk/v2/js#tosspaymentspayment
    const payment = tossPayments.payment({ customerKey });
    // 비회원 결제
    // const payment = tossPayments.payment({customerKey: TossPayments.ANONYMOUS})
    // ------ '카드 등록하기' 버튼 누르면 결제창 띄우기 ------
    // @docs https://docs.tosspayments.com/sdk/v2/js#paymentrequestpayment
    async function requestBillingAuth() {
        await payment.requestBillingAuth({
            method: "CARD", // 자동결제(빌링)는 카드만 지원합니다
            successUrl: window.location.origin + "/billing-success.html", // 요청이 성공하면 리다이렉트되는 URL
            failUrl: window.location.origin + "/payments/fail", // 요청이 실패하면 리다이렉트되는 URL
            customerEmail: "customer123@gmail.com",
            customerName: "김토스",
        });
    }
</script>
</body>
</html>
