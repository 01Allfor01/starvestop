name: Cd-Backend

on:
  pull_request:
    types:
      - closed
    branches:
      - dev
    paths:
      - "backend/**"
      - ".github/workflows/cd-backend.yml"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}

  BLUE_NAME: starve-stop-blue
  GREEN_NAME: starve-stop-green
  BLUE_HOST_PORT: "8080"
  GREEN_HOST_PORT: "8081"
  CONTAINER_PORT: "8080"

jobs:
  build-and-push:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build (Gradle)
        working-directory: ./backend
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image (backend)
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials (for ALB)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug listener
        run: |
          aws elbv2 describe-listeners --listener-arn "${{ secrets.ALB_LISTENER_ARN }}"

      - name: Decide CURRENT(Weight=100) and set IDLE (TG/Name/Port)
        id: decide
        run: |
          set -e
          ALB_LISTENER_ARN="${{ secrets.ALB_LISTENER_ARN }}"
          TG_BLUE="${{ secrets.TG_BLUE_ARN }}"
          TG_GREEN="${{ secrets.TG_GREEN_ARN }}"

          CURRENT=$(aws elbv2 describe-listeners \
            --listener-arn "$ALB_LISTENER_ARN" \
            --query "Listeners[0].DefaultActions[0].ForwardConfig.TargetGroups[?Weight==\`100\`].TargetGroupArn | [0]" \
            --output text)

          echo "CURRENT_TG=$CURRENT" >> $GITHUB_OUTPUT
          echo "CURRENT_TG=$CURRENT"

          if [ "$CURRENT" = "$TG_BLUE" ]; then
            # 현재 BLUE가 live(100) → GREEN이 idle
            echo "IDLE_TG=$TG_GREEN" >> $GITHUB_OUTPUT
            echo "IDLE_NAME=${{ env.GREEN_NAME }}" >> $GITHUB_OUTPUT
            echo "IDLE_PORT=${{ env.GREEN_HOST_PORT }}" >> $GITHUB_OUTPUT
            echo "IDLE_COLOR=GREEN" >> $GITHUB_OUTPUT

          elif [ "$CURRENT" = "$TG_GREEN" ]; then
            # 현재 GREEN이 live(100) → BLUE가 idle
            echo "IDLE_TG=$TG_BLUE" >> $GITHUB_OUTPUT
            echo "IDLE_NAME=${{ env.BLUE_NAME }}" >> $GITHUB_OUTPUT
            echo "IDLE_PORT=${{ env.BLUE_HOST_PORT }}" >> $GITHUB_OUTPUT
            echo "IDLE_COLOR=BLUE" >> $GITHUB_OUTPUT

          else
            # 첫 배포/예외: live를 GREEN으로 가정, idle은 BLUE
            echo "Unknown CURRENT_TG($CURRENT). Assume GREEN is live, BLUE is idle."
            echo "CURRENT_TG=$TG_GREEN" >> $GITHUB_OUTPUT
            echo "IDLE_TG=$TG_BLUE" >> $GITHUB_OUTPUT
            echo "IDLE_NAME=${{ env.BLUE_NAME }}" >> $GITHUB_OUTPUT
            echo "IDLE_PORT=${{ env.BLUE_HOST_PORT }}" >> $GITHUB_OUTPUT
            echo "IDLE_COLOR=BLUE" >> $GITHUB_OUTPUT
          fi

          echo "IDLE_TG=${{ steps.decide.outputs.IDLE_TG }}"
          echo "IDLE_NAME=${{ steps.decide.outputs.IDLE_NAME }}"
          echo "IDLE_PORT=${{ steps.decide.outputs.IDLE_PORT }}"
          echo "IDLE_COLOR=${{ steps.decide.outputs.IDLE_COLOR }}"

      - name: Deploy to IDLE on EC2-1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_1 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,CONTAINER_PORT
          script: |
            set -e
            IDLE_NAME="${{ steps.decide.outputs.IDLE_NAME }}"
            IDLE_PORT="${{ steps.decide.outputs.IDLE_PORT }}"

            echo "${{ secrets.APPLICATION }}" > .env
            
            mkdir -p /home/ubuntu/logs
            
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            docker stop "$IDLE_NAME" || true
            docker rm "$IDLE_NAME" || true

            docker run -d \
              --name "$IDLE_NAME" \
              --env-file .env \
              -v /home/ubuntu/fcm/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro \
              -v /home/ubuntu/logs:/var/log/app \
              -e LOGGING_FILE_NAME="/var/log/app/spring-${IDLE_PORT}.log" \
              -p "${IDLE_PORT}:${CONTAINER_PORT}" \
              $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            for i in {1..60}; do
              if curl -fsS "http://localhost:${IDLE_PORT}/actuator/health" > /dev/null; then
                echo "EC2-1 ${IDLE_NAME} health OK"
                exit 0
              fi
              sleep 2
            done
            echo "EC2-1 ${IDLE_NAME} health FAILED"
            docker logs --tail 200 "$IDLE_NAME" || true
            exit 1

      - name: Deploy to IDLE on EC2-2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,CONTAINER_PORT
          script: |
            set -e
            IDLE_NAME="${{ steps.decide.outputs.IDLE_NAME }}"
            IDLE_PORT="${{ steps.decide.outputs.IDLE_PORT }}"

            echo "${{ secrets.APPLICATION }}" > .env
            
            mkdir -p /home/ubuntu/logs
            
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"
            
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            docker stop "$IDLE_NAME" || true
            docker rm "$IDLE_NAME" || true

            docker run -d \
              --name "$IDLE_NAME" \
              --env-file .env \
              -v /home/ubuntu/fcm/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro \
              -v /home/ubuntu/logs:/var/log/app \
              -e LOGGING_FILE_NAME="/var/log/app/spring-${IDLE_PORT}.log" \
              -p "${IDLE_PORT}:${CONTAINER_PORT}" \
              $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            for i in {1..60}; do
              if curl -fsS "http://localhost:${IDLE_PORT}/actuator/health" > /dev/null; then
                echo "EC2-2 ${IDLE_NAME} health OK"
                exit 0
              fi
              sleep 2
            done
            echo "EC2-2 ${IDLE_NAME} health FAILED"
            docker logs --tail 200 "$IDLE_NAME" || true
            exit 1

      - name: Wait until ALB IDLE target group becomes healthy
        run: |
          set -e
          IDLE_TG="${{ steps.decide.outputs.IDLE_TG }}"
          echo "Waiting ALB target group to be healthy: $IDLE_TG"

          for i in {1..60}; do
            STATES=$(aws elbv2 describe-target-health \
              --target-group-arn "$IDLE_TG" \
              --query "TargetHealthDescriptions[*].TargetHealth.State" \
              --output text)

            echo "Target states: $STATES"

            if echo "$STATES" | tr '\t' '\n' | grep -vq healthy; then
              sleep 5
            else
              echo "All targets are healthy."
              exit 0
            fi
          done

          echo "Targets did not become healthy in time."
          exit 1

      - name: Switch traffic by weight (100/0)
        id: switch
        run: |
          set -e
          ALB_LISTENER_ARN="${{ secrets.ALB_LISTENER_ARN }}"
          TG_BLUE="${{ secrets.TG_BLUE_ARN }}"
          TG_GREEN="${{ secrets.TG_GREEN_ARN }}"
          IDLE_TG="${{ steps.decide.outputs.IDLE_TG }}"

          if [ "$IDLE_TG" = "$TG_BLUE" ]; then
            echo "Switch to BLUE 100 / GREEN 0"
            aws elbv2 modify-listener \
              --listener-arn "$ALB_LISTENER_ARN" \
              --default-actions "Type=forward,ForwardConfig={TargetGroups=[{TargetGroupArn=$TG_BLUE,Weight=100},{TargetGroupArn=$TG_GREEN,Weight=0}]}"
          else
            echo "Switch to GREEN 100 / BLUE 0"
            aws elbv2 modify-listener \
              --listener-arn "$ALB_LISTENER_ARN" \
              --default-actions "Type=forward,ForwardConfig={TargetGroups=[{TargetGroupArn=$TG_BLUE,Weight=0},{TargetGroupArn=$TG_GREEN,Weight=100}]}"
          fi

      - name: Rollback traffic by weight (restore previous 100/0)
        if: failure()
        run: |
          set -e
          ALB_LISTENER_ARN="${{ secrets.ALB_LISTENER_ARN }}"
          TG_BLUE="${{ secrets.TG_BLUE_ARN }}"
          TG_GREEN="${{ secrets.TG_GREEN_ARN }}"
          PREV_TG="${{ steps.decide.outputs.CURRENT_TG }}"

          if [ "$PREV_TG" = "$TG_BLUE" ]; then
            echo "Rollback to BLUE 100 / GREEN 0"
            aws elbv2 modify-listener \
              --listener-arn "$ALB_LISTENER_ARN" \
              --default-actions "Type=forward,ForwardConfig={TargetGroups=[{TargetGroupArn=$TG_BLUE,Weight=100},{TargetGroupArn=$TG_GREEN,Weight=0}]}"
          else
            echo "Rollback to GREEN 100 / BLUE 0"
            aws elbv2 modify-listener \
              --listener-arn "$ALB_LISTENER_ARN" \
              --default-actions "Type=forward,ForwardConfig={TargetGroups=[{TargetGroupArn=$TG_BLUE,Weight=0},{TargetGroupArn=$TG_GREEN,Weight=100}]}"
          fi

