name: Cd-Backend

on:
  push:
    branches:
      - feat/cicd/test
  pull_request:
    types: [closed]
    branches: [dev]
    paths:
      - "backend/**"
      - ".github/workflows/cd-backend.yml"

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}

  BLUE_NAME: starve-stop-blue
  GREEN_NAME: starve-stop-green
  BLUE_HOST_PORT: "8080"
  GREEN_HOST_PORT: "8081"
  CONTAINER_PORT: "8080"

jobs:
  build-and-push:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build (Gradle)
        run: |
          chmod +x ./gradlew
          ./gradlew clean build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image (backend)
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials (for ALB)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Decide IDLE + remember PREV TG
        id: decide
        run: |
          set -e

          PREV_TG=$(aws elbv2 describe-listeners \
            --listener-arn "${{ secrets.ALB_LISTENER_ARN }}" \
            --query "Listeners[0].DefaultActions[0].TargetGroupArn" \
            --output text)

          echo "PREV_TG=$PREV_TG" >> $GITHUB_OUTPUT
          echo "PREV_TG=$PREV_TG"

          if [ "$PREV_TG" = "${{ secrets.TG_BLUE_ARN }}" ]; then
            echo "IDLE_TG=${{ secrets.TG_GREEN_ARN }}" >> $GITHUB_OUTPUT
            echo "IDLE_NAME=${{ env.GREEN_NAME }}" >> $GITHUB_OUTPUT
            echo "IDLE_PORT=${{ env.GREEN_HOST_PORT }}" >> $GITHUB_OUTPUT
          elif [ "$PREV_TG" = "${{ secrets.TG_GREEN_ARN }}" ]; then
            echo "IDLE_TG=${{ secrets.TG_BLUE_ARN }}" >> $GITHUB_OUTPUT
            echo "IDLE_NAME=${{ env.BLUE_NAME }}" >> $GITHUB_OUTPUT
            echo "IDLE_PORT=${{ env.BLUE_HOST_PORT }}" >> $GITHUB_OUTPUT
          else
            echo "Unknown current target group: $PREV_TG"
            exit 1
          fi

      - name: Deploy to IDLE on EC2-1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_1 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,CONTAINER_PORT
          script: |
            set -e
            IDLE_NAME="${{ steps.decide.outputs.IDLE_NAME }}"
            IDLE_PORT="${{ steps.decide.outputs.IDLE_PORT }}"

            echo "${{ secrets.APPLICATION }}" > .env
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            docker stop "$IDLE_NAME" || true
            docker rm "$IDLE_NAME" || true

            docker run -d \
              --name "$IDLE_NAME" \
              --env-file .env \
              -v /home/ubuntu/fcm/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro \
              -p "${IDLE_PORT}:${CONTAINER_PORT}" \
              $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            for i in {1..60}; do
              if curl -fsS "http://localhost:${IDLE_PORT}/actuator/health" > /dev/null; then
                echo "EC2-1 ${IDLE_NAME} health OK"
                exit 0
              fi
              sleep 2
            done
            echo "EC2-1 ${IDLE_NAME} health FAILED"
            docker logs --tail 200 "$IDLE_NAME" || true
            exit 1

      - name: Deploy to IDLE on EC2-2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_2 }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,CONTAINER_PORT
          script: |
            set -e
            IDLE_NAME="${{ steps.decide.outputs.IDLE_NAME }}"
            IDLE_PORT="${{ steps.decide.outputs.IDLE_PORT }}"

            echo "${{ secrets.APPLICATION }}" > .env
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            docker stop "$IDLE_NAME" || true
            docker rm "$IDLE_NAME" || true

            docker run -d \
              --name "$IDLE_NAME" \
              --env-file .env \
              -v /home/ubuntu/fcm/firebase-adminsdk.json:/app/firebase-adminsdk.json:ro \
              -p "${IDLE_PORT}:${CONTAINER_PORT}" \
              $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

            for i in {1..60}; do
              if curl -fsS "http://localhost:${IDLE_PORT}/actuator/health" > /dev/null; then
                echo "EC2-2 ${IDLE_NAME} health OK"
                exit 0
              fi
              sleep 2
            done
            echo "EC2-2 ${IDLE_NAME} health FAILED"
            docker logs --tail 200 "$IDLE_NAME" || true
            exit 1

      - name: Wait until ALB target group becomes healthy
        run: |
          set -e
          IDLE_TG="${{ steps.decide.outputs.IDLE_TG }}"
          echo "Waiting ALB target group to be healthy: $IDLE_TG"

          for i in {1..60}; do
            STATES=$(aws elbv2 describe-target-health \
              --target-group-arn "$IDLE_TG" \
              --query "TargetHealthDescriptions[*].TargetHealth.State" \
              --output text)

            echo "Target states: $STATES"

            if echo "$STATES" | tr '\t' '\n' | grep -vq healthy; then
              sleep 5
            else
              echo "All targets are healthy."
              exit 0
            fi
          done

          echo "Targets did not become healthy in time."
          exit 1

      - name: Switch ALB to IDLE target group
        run: |
          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.ALB_LISTENER_ARN }}" \
            --default-actions Type=forward,TargetGroupArn="${{ steps.decide.outputs.IDLE_TG }}"

      - name: Rollback ALB to previous target group
        if: failure()
        run: |
          aws elbv2 modify-listener \
            --listener-arn "${{ secrets.ALB_LISTENER_ARN }}" \
            --default-actions Type=forward,TargetGroupArn="${{ steps.decide.outputs.PREV_TG }}"
